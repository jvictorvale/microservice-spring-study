services:
  zipkin-server:
    image: openzipkin/zipkin:3.5.1
    ports:
      - 9411:9411
    restart: always
    networks:
      - vale-network

  naming-server:
    image: jvictorvale/naming-server
    build:
      context: ./naming-server
      dockerfile: Dockerfile
    ports:
      - 8761:8761
    restart: always
    depends_on:
      - zipkin-server
    networks:
      - vale-network

  api-gateway:
    image: jvictorvale/api-gateway
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - 8765:8765
    restart: always
    depends_on:
      - zipkin-server
      - naming-server
    environment:
      SPRING_ZIPKIN_BASEURL: http://zipkin-server:9411
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
    networks:
      - vale-network

  book-db:
    image: mysql:9.6.0
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: docker
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: book_service
    ports:
      - 3310:3306
    networks:
      - vale-network

  exchange-db:
    image: mysql:9.6.0
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_USER: docker
      MYSQL_PASSWORD: 123456
      MYSQL_DATABASE: exchange_service
    ports:
      - 3308:3306
    networks:
      - vale-network

  exchange_service:
    image: jvictorvale/exchange_service
    restart: always
    build:
      context: ./exchange-service
      dockerfile: Dockerfile
    environment:
      TZ: America/Sao_Paulo
      SPRING_ZIPKIN_BASEURL: http://zipkin-server:9411
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://exchange-db:3306/exchange_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2
      SPRING_DATASOURCE_USERNAME: docker
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - 8000:8000
    depends_on:
      - zipkin-server
      - naming-server
      - exchange-db
    networks:
      - vale-network

  book_service:
    image: jvictorvale/book_service
    restart: always
    build:
      context: ./book-service
      dockerfile: Dockerfile
    environment:
      TZ: America/Sao_Paulo
      SPRING_ZIPKIN_BASEURL: http://zipkin-server:9411
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://book-db:3306/book_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&enabledTLSProtocols=TLSv1.2
      SPRING_DATASOURCE_USERNAME: docker
      SPRING_DATASOURCE_PASSWORD: 123456
    ports:
      - 8100:8100
    depends_on:
      - zipkin-server
      - naming-server
      - book-db
    networks:
      - vale-network


networks:
  vale-network:
    name: vale-network
    driver: bridge